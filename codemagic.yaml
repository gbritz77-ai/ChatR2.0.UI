workflows:

  # ─── iOS App Store build ────────────────────────────────────────────────────
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.za.outsec.chatr
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 20

    scripts:
      - name: Install npm dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set iOS version
        script: |
          cd ios/App
          agvtool new-marketing-version 1.0
          agvtool new-version -all $(($(agvtool what-version -terse) + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false   # set true when ready for full release

  # ─── Android Play Store build ───────────────────────────────────────────────
  android-play-store:
    name: Android Play Store
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - chatr_keystore
      vars:
        PACKAGE_NAME: co.za.outsec.chatr
      node: 20

    scripts:
      - name: Install npm dependencies
        script: npm ci --legacy-peer-deps

      - name: Build React app
        script: npm run build

      - name: Sync Capacitor
        script: |
          rm -rf android/app/src/main/assets/public
          npx cap sync android

      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
